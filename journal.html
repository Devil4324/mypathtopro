<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Journal | Path To Pro</title>

<link rel="stylesheet" href="style.css">

<style>

.page-container{

max-width:1000px;

margin:auto;

padding:40px 20px;

}

.page-title{

font-size:3rem;

margin-bottom:10px;

}

.page-subtitle{

color:#9ca3af;

margin-bottom:30px;

}

.back-link{

display:inline-block;

margin-bottom:25px;

text-decoration:none;

color:#58a6ff;

}

.search-box{

margin-bottom:30px;

}

.search-box input{

width:100%;

padding:15px;

border-radius:12px;

border:none;

background:#111827;

color:white;

box-sizing:border-box;

}

.journal-item{

background:rgba(15,23,42,.85);

padding:20px;

margin-bottom:15px;

border-radius:15px;

cursor:pointer;

border:1px solid rgba(255,255,255,.08);

}

.journal-details{

display:none;

margin-top:15px;

}

.journal-details.show{

display:block;

}

@media(max-width:768px){

.page-title{

font-size:2rem;

}

}

</style>

</head>

<body>

<div class="page-container">

<a
href="index.html"
class="back-link">

← Back to Home

</a>

<h1 class="page-title">
📚 Journal
</h1>

<p class="page-subtitle">

Lessons, mistakes, wins and daily growth.

</p>

<div class="search-box">

<input
type="text"
id="searchJournal"
placeholder="Search Journals..."
onkeyup="searchJournals()">

</div>

<div id="journalContainer"></div>

</div>

<script src="storage.js"></script>
<script src="journal.js"></script>

</body>

</html>
